services:
  mariadb:
    image: mariadb:11.4
    container_name: mcaeoc_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass-change-me
      MARIADB_DATABASE: dbo
      MARIADB_USER: mcaeoc
      MARIADB_PASSWORD: mcaeocpass-change-me
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  web:
    image: ghcr.io/your-github-user-or-org/mcaeoc-time-tracking-synology-web:latest
    container_name: mcaeoc_web_mariadb
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      FLASK_SECRET_KEY: change-this-secret-key
      GUNICORN_WORKERS: 2
      GUNICORN_TIMEOUT: 120
      EMPLOYEE_TIME_TRACKING_CONNECTION_STRING: SERVER=mariadb;DATABASE=dbo;UID=mcaeoc;PWD=mcaeocpass-change-me;PORT=3306;
      SMTP_HOST:
      SMTP_PORT: 587
      SMTP_FROM_EMAIL:
      SMTP_FROM_NAME: MCAEOC Employee Time Tracking
      SMTP_USERNAME:
      SMTP_PASSWORD:
      SMTP_USE_TLS: "true"
      SMTP_USE_SSL: "false"
    ports:
      - "8000:8000"

  mobile_api:
    image: ghcr.io/your-github-user-or-org/mcaeoc-time-tracking-synology-mobile-api:latest
    container_name: mcaeoc_mobile_api_mariadb
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      EMPLOYEE_TIME_TRACKING_CONNECTION_STRING: SERVER=mariadb;DATABASE=dbo;UID=mcaeoc;PWD=mcaeocpass-change-me;PORT=3306;
      EMPLOYEE_TIME_TRACKING_MOBILE_API_KEY: change-me
      FACE_MODEL_NAME: ArcFace
      FACE_DETECTOR_BACKEND: ssd
      FACE_DISTANCE_THRESHOLD: 0.30
      FACE_ALIGN: "true"
      FACE_ENFORCE_DETECTION: "true"
      FACE_EXPAND_PERCENTAGE: 10
      FACE_MAX_IMAGE_SIZE: 1280
    ports:
      - "8001:8000"

volumes:
  mariadb_data:
