{% extends "base.html" %}

{% block content %}
<section class="card narrow-card login-card">
    <h2>Sign In</h2>
    <form method="post" class="stack-form">
        <label>
            Email
            <input type="email" name="email" required>
        </label>
        <label>
            Password
            <input type="password" name="password" required>
        </label>
        <button type="submit">Log In</button>
    </form>
    <p class="helper-text helper-text-left"><a href="{{ url_for('forgot_password') }}">Forgot password?</a></p>
    <p class="helper-text">Logging in for the first time? Use your temporary password, then follow the prompts to create a new one.</p>
</section>
{% endblock %}
